name: Daily Quant Scanner (Telegram)

on:
  schedule:
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4  # 👈 여기를 v3에서 v4로 변경했습니다!

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5  # 👈 여기를 v4에서 v5로 변경했습니다!
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: |
          pip install pandas yfinance requests fredapi xlsxwriter

      - name: 🚀 스캐너 실행 및 텔레그램 전송!
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py
